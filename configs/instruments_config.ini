# Optional instrument connection settings.
# If this file (or a key) is missing, the built-in defaults are used.

[LockIn]
# Ametek/Signal Recovery 7270 VISA resource.
# Default (USB):
resource = USB0::0x0A2D::0x001B::15342534::RAW
# The 7270 also has an Ethernet interface (rear panel), which is much more
# robust than USB against EMI glitches and interface hangs.  To use it:
#   1. Give the 7270 a fixed IP on its front panel (Main Menu -> Communications
#      -> Ethernet), on the same subnet as the PC (or a direct cable to a
#      second network port).
#   2. Comment the USB line above and set (port 50000 is the 7270's command
#      socket):
# resource = TCPIP0::192.168.0.20::50000::SOCKET
