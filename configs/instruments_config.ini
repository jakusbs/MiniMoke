# Optional instrument connection settings (shipped defaults).
#
# IMPORTANT — rig-specific settings belong in instruments_config.local.ini
# (same folder, same format). That file is git-ignored and never shipped, so a
# code update can NOT reset it — while THIS file is overwritten by updates.
# Example instruments_config.local.ini for a 7270 on Ethernet:
#
#   [LockIn]
#   resource = TCPIP0::192.168.77.2::50000::SOCKET
#
# If neither file defines a resource, the built-in USB default is used.

[LockIn]
# Ametek/Signal Recovery 7270 VISA resource.
# Default (USB):
resource = USB0::0x0A2D::0x001B::15342534::RAW
# The 7270 also has an Ethernet interface (rear panel) — see ETHERNET_SETUP.md.
# Set the instrument's IP on its front panel, then put the TCPIP resource in
# instruments_config.local.ini as shown above (port 50000 is the 7270's command
# socket; the driver falls back to 50001 automatically when 50000 is busy).
